# Automated dependency + security updates. Grouped weekly to keep PR noise low;
# security patches still arrive as soon as GitHub flags them.
version: 2
updates:
  # Python backend (uv / pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # Next.js frontend
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns: ["*"]
    ignore:
      # Tailwind v4 is a breaking change (PostCSS plugin moved to @tailwindcss/postcss);
      # migrate deliberately rather than letting a grouped bump pull it in and break the build.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Base images in the Dockerfiles
  - package-ecosystem: "docker"
    directory: "/infra"
    schedule:
      interval: "weekly"
