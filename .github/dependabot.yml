# Automated dependency + security updates. Grouped weekly to keep PR noise low;
# security patches still arrive as soon as GitHub flags them.
version: 2
updates:
  # Python backend (uv / pyproject.toml + uv.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # Next.js frontend
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns: ["*"]
        # Group only minor + patch. Breaking MAJORS (Tailwind v4, ESLint 9, etc.) come as
        # separate individual PRs to migrate deliberately, so they never block the grouped bump.
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Base images in the Dockerfiles
  - package-ecosystem: "docker"
    directory: "/infra"
    schedule:
      interval: "weekly"
