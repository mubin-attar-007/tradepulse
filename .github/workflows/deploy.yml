name: Deploy

# Manual-only. The production VM builds its own images via infra/deploy.sh, so we
# do NOT auto-build/push to GHCR on every commit (saves Actions minutes and avoids
# a long, noisy job). Trigger this from the Actions tab only if you specifically
# want prebuilt images in GitHub's container registry.
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # Container registries require lowercase names; the repo slug has uppercase.
      - name: Lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
      - name: Build + push web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: infra/Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}

  # Runs only once you set the DEPLOY_HOST repo variable + DEPLOY_SSH_KEY secret.
  deploy:
    needs: images
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_HOST != '' }}
    steps:
      - name: SSH + deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: cd ${{ vars.DEPLOY_PATH }} && ./infra/deploy.sh
