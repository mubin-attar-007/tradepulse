name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
      - name: Build + push web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: infra/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}

  # Runs only once you set the DEPLOY_HOST repo variable + DEPLOY_SSH_KEY secret.
  deploy:
    needs: images
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_HOST != '' }}
    steps:
      - name: SSH + deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: cd ${{ vars.DEPLOY_PATH }} && ./infra/deploy.sh
